name: Publish CV

on:
  push:
    branches:
      - main
    paths:
      - 'resume/**'
      - '.github/workflows/publish-cv.yml'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX CV
        uses: xu-cheng/texlive-action@v3
        with:
          run: |
            tlmgr install sourcesans
            cd resume && latexmk -pdf -file-line-error -halt-on-error -interaction=nonstopmode template.tex

      - name: Get current date as version tag
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Rename PDF
        run: mv resume/template.pdf Gabriel_Da_Cunha_CV.pdf

      - name: Create GitHub Release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cv-${{ steps.version.outputs.tag }}
          name: "CV — ${{ steps.version.outputs.tag }}"
          overwrite_files: true
          body: |
            # 🚀 Gabriel Da Cunha — CV Drop ${{ steps.version.outputs.tag }}

            **What's inside:**
            - 💼 Real experience at real companies
            - 🔧 A stack longer than your grocery list
            - 📦 Open-source work people actually use
            - ☕ Powered entirely by caffeine

            _Compiled from `resume/template.tex` with love and `latexmk`._
          files: Gabriel_Da_Cunha_CV.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}